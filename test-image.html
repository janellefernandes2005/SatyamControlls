<!-- test-images.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Test MongoDB Images</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .image-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            margin-top: 20px;
        }
        .image-box { 
            border: 2px solid #ddd; 
            padding: 15px; 
            text-align: center; 
            border-radius: 10px;
        }
        img { 
            max-width: 100%; 
            height: 200px; 
            object-fit: contain;
            background: #f5f5f5;
        }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .loading { color: blue; }
    </style>
</head>
<body>
    <h1>Test MongoDB Images</h1>
    
    <div class="image-container" id="imageContainer">
        <p class="loading">Loading images...</p>
    </div>

    <script>
        const testImages = [
            // Your carousel products
            { name: "Ball Valve", id: "6970feed1ef2754cc49bac9d" },
            { name: "Check Valve", id: "6970feed1ef2754cc49baca3" },
            { name: "Manifold Valve", id: "6970fef01ef2754cc49baccb" },
            { name: "Pipe Fitting", id: "6970fef01ef2754cc49bacd7" },
            { name: "Tube Fittings (Compression Union)", id: "6970feef1ef2754cc49bacad" },
            { name: "Needle Valve", id: "6970fef01ef2754cc49bacd1" },
            { name: "Gauge Accessories", id: "6970feed1ef2754cc49bacbb" }
        ];

        const container = document.getElementById('imageContainer');
        container.innerHTML = '';

        testImages.forEach(item => {
            const imgUrl = `http://localhost:5000/api/products/image/${item.id}`;
            
            const box = document.createElement('div');
            box.className = 'image-box';
            box.innerHTML = `
                <h3>${item.name}</h3>
                <p>ID: ${item.id}</p>
                <img src="${imgUrl}" alt="${item.name}" 
                     onload="this.parentElement.querySelector('.status').className='success'; this.parentElement.querySelector('.status').textContent='✅ Loaded'"
                     onerror="this.parentElement.querySelector('.status').className='error'; this.parentElement.querySelector('.status').textContent='❌ Failed'">
                <p class="status loading">⏳ Loading...</p>
                <a href="${imgUrl}" target="_blank">Open in new tab</a>
            `;
            
            container.appendChild(box);
        });
    </script>
</body>
</html>
