services:
  - type: web
    name: satyam-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 8000

  - type: web
    name: satyam-ml
    runtime: python
    rootDir: backend/python_ml_service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn admin_ml_service:app --host 0.0.0.0 --port 8002
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: satyam-frontend
    runtime: static
    publish: ./
    routes:
      - type: rewrite
        source: /*
        destination: /home.html